name: VolunteerSync — CI & Deploy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Global read-only; deploy job overrides with write
permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1 — Analyze & Unit/Widget Tests
  # ─────────────────────────────────────────────────────────────────
  test:
    name: 🔍 Analyze & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting (advisory)
        run: flutter format --output=none --set-exit-if-changed .
        continue-on-error: true

      - name: Analyze project source
        run: flutter analyze --no-fatal-infos

      - name: Run unit & widget tests
        run: flutter test --reporter=github

  # ─────────────────────────────────────────────────────────────────
  # JOB 2 — Integration Tests (headless Chrome)
  # ─────────────────────────────────────────────────────────────────
  integration_test:
    name: 🌐 Integration Tests (Web)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Start ChromeDriver
        run: |
          chromedriver --port=4444 &
          sleep 2

      - name: Run Integration Tests on Web
        run: |
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/app_test.dart \
            -d web-server \
            --browser-name=chrome \
            --headless
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────────
  # JOB 3 — Build Flutter Web (only on push to main)
  # ─────────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build Web Release
    runs-on: ubuntu-latest
    needs: [test, integration_test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Flutter Web
        run: |
          flutter build web \
            --release \
            --base-href "/volunteersync/" \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Add .nojekyll (prevent Jekyll processing)
        run: touch build/web/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  # ─────────────────────────────────────────────────────────────────
  # JOB 4 — Deploy to GitHub Pages
  # ─────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: github-pages-deploy
      cancel-in-progress: true
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
