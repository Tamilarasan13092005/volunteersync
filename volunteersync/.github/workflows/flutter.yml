name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install Flutter dependencies
        run: |
          cd volunteersync
          flutter pub get

      - name: Analyze code
        run: |
          cd volunteersync
          flutter analyze --no-fatal-infos

      - name: Build web
        run: |
          cd volunteersync
          flutter build web --release

      - name: Run Appium simulation tests
        run: |
          cd volunteersync/appium_tests
          npm install
          npm test

      - name: Run Selenium simulation tests
        run: |
          cd volunteersync/selenium_tests
          npm install
          npm test